name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  node-matrix:
    name: Node ${{ matrix.node }} on Ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 18
          - 20
          - 22

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run bench:memory:check
      - run: npm run pack:check

  windows-smoke:
    name: Windows smoke on Node 20
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run bench:memory:check
      - run: npm run pack:check
