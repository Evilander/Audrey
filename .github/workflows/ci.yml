name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  node-matrix:
    name: Node ${{ matrix.node }} on Ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # package.json declares engines.node >=20 (since v0.22.0). Node 18
        # is intentionally omitted: vitest 4.1+ uses node:util.styleText,
        # which only exists in Node 20.12+, and we don't ship a Node-18
        # supported runtime.
        node:
          - 20
          - 22

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run bench:memory:check
      - run: npm run smoke:cli
      - run: npm run pack:check

  python-sdk:
    name: Python SDK on 3.11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci
      - run: npm run build
      - run: python -m pip install --upgrade pip setuptools wheel build
      - run: python -m pip install -e ./python
      - run: python -m unittest discover -s python/tests -v
      - run: python -m build --no-isolation python

  docker-smoke:
    name: Docker smoke on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t audrey:ci .
      - run: docker run -d --name audrey-smoke -p 3487:3487 -e AUDREY_EMBEDDING_PROVIDER=mock -e AUDREY_LLM_PROVIDER=mock -e AUDREY_API_KEY=test-secret audrey:ci
      - run: |
          for i in $(seq 1 30); do
            if curl -fsS -H "Authorization: Bearer test-secret" http://127.0.0.1:3487/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs audrey-smoke
          exit 1
      - run: docker rm -f audrey-smoke

  windows-smoke:
    name: Windows smoke on Node 20
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run bench:memory:check
      - run: npm run smoke:cli
      - run: npm run pack:check
