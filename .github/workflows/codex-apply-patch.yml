name: Codex Apply Verified Patch

on:
  push:
    branches:
      - codex/batch-embedding-audit-20260508

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --index .codex/batch-embedding-audit.patch
          git rm .codex/batch-embedding-audit.patch .github/workflows/codex-apply-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Harden batch embeddings and audit deps"
          git push origin "HEAD:${GITHUB_REF_NAME}"
